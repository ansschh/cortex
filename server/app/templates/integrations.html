<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA - Integration Setup</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text2: #8888a0;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
  }
  .header h1 span { color: var(--accent); }
  .header-actions { display: flex; gap: 12px; }
  .btn {
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }
  .btn-green { background: var(--green); color: white; }
  .btn-green:hover { opacity: 0.9; }

  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 16px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text2);
  }
  .stat .num {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  .stat .num.green { color: var(--green); }
  .stat .num.orange { color: var(--orange); }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 32px 80px;
  }

  .category {
    margin-bottom: 32px;
  }
  .category-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .category-header h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent2);
  }
  .category-count {
    font-size: 12px;
    color: var(--text2);
    background: var(--surface2);
    padding: 2px 10px;
    border-radius: 12px;
  }

  .integration {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 8px;
    transition: border-color 0.2s;
  }
  .integration:hover { border-color: var(--accent); }
  .integration.configured { border-left: 3px solid var(--green); }
  .integration.optional { opacity: 0.7; }

  .int-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .int-name {
    font-size: 15px;
    font-weight: 600;
  }
  .int-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 500;
  }
  .badge-free { background: #22c55e22; color: var(--green); }
  .badge-freemium { background: #f59e0b22; color: var(--orange); }
  .badge-paid { background: #ef444422; color: var(--red); }
  .badge-nokey { background: #6366f122; color: var(--accent2); }

  .int-desc {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 10px;
  }
  .int-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .int-row input {
    flex: 1;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Consolas', monospace;
  }
  .int-row input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .int-row input.filled {
    border-color: var(--green);
    background: #22c55e08;
  }
  .int-link {
    font-size: 12px;
    color: var(--accent2);
    text-decoration: none;
    white-space: nowrap;
  }
  .int-link:hover { text-decoration: underline; }

  .env-var-label {
    font-size: 11px;
    color: var(--text2);
    font-family: 'Consolas', monospace;
    min-width: 220px;
  }

  /* Export modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 700px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h2 { margin-bottom: 12px; font-size: 18px; }
  .modal textarea {
    width: 100%;
    height: 400px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--green);
    font-family: 'Consolas', monospace;
    font-size: 13px;
    padding: 16px;
    resize: vertical;
  }
  .modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    justify-content: flex-end;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .search-bar {
    padding: 12px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .search-bar input {
    width: 100%;
    max-width: 400px;
    padding: 10px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
  }
  .search-bar input:focus { outline: none; border-color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <h1><span>NOVA</span> Integration Setup</h1>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="loadFromEnv()">Import from .env</button>
    <button class="btn btn-primary" onclick="showExport()">Export .env</button>
    <button class="btn btn-green" onclick="saveToServer()">Save to Server</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat">Total integrations: <span class="num" id="stat-total">0</span></div>
  <div class="stat">Configured: <span class="num green" id="stat-configured">0</span></div>
  <div class="stat">Remaining: <span class="num orange" id="stat-remaining">0</span></div>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search integrations..." oninput="filterIntegrations()">
</div>

<div class="container" id="integrations-container"></div>

<!-- Export Modal -->
<div class="modal-overlay" id="export-modal">
  <div class="modal">
    <h2>Export .env Configuration</h2>
    <p style="color:var(--text2);font-size:13px;margin-bottom:12px;">
      Copy everything below and paste it into your <code>.env</code> file.
      Only keys you've filled in are included.
    </p>
    <textarea id="export-text" readonly></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeExport()">Close</button>
      <button class="btn btn-primary" onclick="copyExport()">Copy to Clipboard</button>
      <button class="btn btn-green" onclick="downloadExport()">Download .env</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// Render integrations
function render() {
  const container = document.getElementById('integrations-container');
  container.innerHTML = '';
  const search = document.getElementById('search').value.toLowerCase();

  // Group by category
  const groups = {};
  INTEGRATIONS.forEach(int => {
    if (search && !int.name.toLowerCase().includes(search) && !int.desc.toLowerCase().includes(search) && !int.cat.toLowerCase().includes(search)) return;
    if (!groups[int.cat]) groups[int.cat] = [];
    groups[int.cat].push(int);
  });

  let total = 0, configured = 0;

  for (const [cat, items] of Object.entries(groups)) {
    const section = document.createElement('div');
    section.className = 'category';

    const catConfigured = items.filter(i => {
      if (!i.env) return true; // no key needed
      const input = document.querySelector(`input[data-env="${i.env}"]`);
      return input && input.value.trim();
    }).length;

    section.innerHTML = `
      <div class="category-header">
        <h2>${cat}</h2>
        <span class="category-count">${items.length} integrations</span>
      </div>
    `;

    items.forEach(int => {
      total++;
      const div = document.createElement('div');
      div.className = 'integration';

      const freeBadge = {
        'free': '<span class="int-badge badge-free">Free</span>',
        'freemium': '<span class="int-badge badge-freemium">Freemium</span>',
        'paid': '<span class="int-badge badge-paid">Paid</span>',
        'nokey': '<span class="int-badge badge-nokey">No Key Needed</span>',
      }[int.free] || '';

      let inputsHtml = '';
      if (int.env) {
        const envVars = [int.env];
        if (int.env2) envVars.push(int.env2);
        if (int.env3) envVars.push(int.env3);

        envVars.forEach(envVar => {
          const saved = localStorage.getItem(`nova_${envVar}`) || '';
          if (saved) configured++;
          inputsHtml += `
            <div class="int-row" style="margin-bottom:4px;">
              <span class="env-var-label">${envVar}</span>
              <input type="password" data-env="${envVar}" placeholder="Paste ${envVar} here..."
                     value="${saved}" oninput="onInput(this)" onfocus="this.type='text'" onblur="this.type='password'"
                     class="${saved ? 'filled' : ''}">
            </div>
          `;
        });
      } else {
        configured++;
        inputsHtml = '<div style="font-size:12px;color:var(--green);margin-top:4px;">No API key required — works out of the box</div>';
      }

      div.innerHTML = `
        <div class="int-top">
          <div>
            <span class="int-name">${int.name}</span>
            ${freeBadge}
          </div>
          ${int.url ? `<a href="${int.url}" target="_blank" class="int-link">Get API Key &rarr;</a>` : ''}
        </div>
        <div class="int-desc">${int.desc} &mdash; <em>${int.note}</em></div>
        ${inputsHtml}
      `;

      if (int.env && localStorage.getItem(`nova_${int.env}`)) {
        div.classList.add('configured');
      }

      section.appendChild(div);
    });

    container.appendChild(section);
  }

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-configured').textContent = configured;
  document.getElementById('stat-remaining').textContent = total - configured;
}

function onInput(el) {
  const env = el.dataset.env;
  const val = el.value.trim();
  if (val) {
    localStorage.setItem(`nova_${env}`, val);
    el.classList.add('filled');
  } else {
    localStorage.removeItem(`nova_${env}`);
    el.classList.remove('filled');
  }
  // Update parent card
  const card = el.closest('.integration');
  const allFilled = [...card.querySelectorAll('input[data-env]')].every(i => i.value.trim());
  card.classList.toggle('configured', allFilled);
  updateStats();
}

function updateStats() {
  let total = 0, configured = 0;
  INTEGRATIONS.forEach(int => {
    total++;
    if (!int.env) { configured++; return; }
    if (localStorage.getItem(`nova_${int.env}`)) configured++;
  });
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-configured').textContent = configured;
  document.getElementById('stat-remaining').textContent = total - configured;
}

function filterIntegrations() { render(); }

function showExport() {
  const lines = ['# === NOVA Integration API Keys ===',
                 '# Generated from NOVA Integration Setup UI', ''];
  let lastCat = '';

  INTEGRATIONS.forEach(int => {
    if (!int.env) return;
    const envVars = [int.env];
    if (int.env2) envVars.push(int.env2);
    if (int.env3) envVars.push(int.env3);

    const hasAny = envVars.some(e => localStorage.getItem(`nova_${e}`));
    if (!hasAny) return;

    if (int.cat !== lastCat) {
      lines.push(`# --- ${int.cat} ---`);
      lastCat = int.cat;
    }

    envVars.forEach(envVar => {
      const val = localStorage.getItem(`nova_${envVar}`) || '';
      if (val) lines.push(`${envVar}=${val}`);
    });
    lines.push('');
  });

  document.getElementById('export-text').value = lines.join('\n');
  document.getElementById('export-modal').classList.add('show');
}

function closeExport() {
  document.getElementById('export-modal').classList.remove('show');
}

function copyExport() {
  const text = document.getElementById('export-text').value;
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!'));
}

function downloadExport() {
  const text = document.getElementById('export-text').value;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'nova_integrations.env';
  a.click();
  showToast('Downloaded nova_integrations.env');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function loadFromEnv() {
  try {
    const resp = await fetch('/api/integrations/env');
    const data = await resp.json();
    if (data.keys) {
      for (const [key, val] of Object.entries(data.keys)) {
        if (val && val !== '...' && val !== 'xoxb-...') {
          localStorage.setItem(`nova_${key}`, val);
        }
      }
      render();
      showToast(`Imported ${Object.keys(data.keys).length} keys from server .env`);
    }
  } catch(e) {
    showToast('Could not load from server — paste keys manually');
  }
}

async function saveToServer() {
  const keys = {};
  INTEGRATIONS.forEach(int => {
    if (!int.env) return;
    const envVars = [int.env];
    if (int.env2) envVars.push(int.env2);
    if (int.env3) envVars.push(int.env3);
    envVars.forEach(envVar => {
      const val = localStorage.getItem(`nova_${envVar}`);
      if (val) keys[envVar] = val;
    });
  });

  try {
    const resp = await fetch('/api/integrations/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keys }),
    });
    const data = await resp.json();
    showToast(data.message || 'Saved to server!');
  } catch(e) {
    showToast('Save failed — server might not be running');
  }
}

// Init
render();
</script>
</body>
</html>
