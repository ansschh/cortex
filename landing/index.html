<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aeon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    background: #030712;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #e2e8f0;
    user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ---- Starfield ---- */
  .stars-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }

  /* ---- Ambient background glow ---- */
  .ambient {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse 50% 40% at 50% 42%, rgba(40,90,180,0.035) 0%, transparent 70%);
  }

  /* ---- Shader sphere container ---- */
  .sphere-wrap {
    position: relative;
    width: 300px; height: 300px;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
    margin-bottom: 36px;
    cursor: pointer;
  }

  .shader-sphere {
    width: 280px; height: 280px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 80px 20px rgba(100,160,255,0.08),
      0 0 160px 60px rgba(80,140,240,0.04);
    transition: box-shadow 0.6s;
  }

  .shader-sphere canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  /* Sphere overlay — soft edge fade to background */
  .sphere-fade {
    position: absolute; inset: 0;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(circle at 50% 50%,
      transparent 35%,
      rgba(3,7,18,0.2) 55%,
      rgba(3,7,18,0.6) 70%,
      rgba(3,7,18,0.92) 85%,
      #030712 100%
    );
    z-index: 1;
  }

  /* White highlight on sphere */
  .sphere-highlight {
    position: absolute;
    width: 60%; height: 60%;
    top: 8%; left: 12%;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%,
      rgba(255,255,255,0.07) 0%,
      transparent 60%
    );
    pointer-events: none; z-index: 2;
  }

  /* Listening state */
  .sphere-wrap.listening .shader-sphere {
    box-shadow:
      0 0 100px 30px rgba(120,180,255,0.15),
      0 0 200px 80px rgba(80,140,240,0.08);
  }

  /* Thinking state */
  .sphere-wrap.thinking .shader-sphere {
    box-shadow:
      0 0 60px 15px rgba(100,160,255,0.12),
      0 0 120px 40px rgba(80,140,240,0.06);
    animation: thinkPulse 1s ease-in-out infinite;
  }

  @keyframes thinkPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  /* ---- Text ---- */
  .brand {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 44px;
    font-weight: 300;
    letter-spacing: 16px;
    text-transform: uppercase;
    color: rgba(200, 220, 255, 0.85);
    z-index: 2;
    margin-bottom: 8px;
    text-shadow: 0 0 40px rgba(100, 160, 255, 0.1);
  }

  .tagline {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 4px;
    color: rgba(140, 165, 200, 0.4);
    text-transform: uppercase;
    z-index: 2;
    margin-bottom: 52px;
  }

  /* ---- Chat interface ---- */
  .chat-container {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
    width: min(520px, 90vw);
  }

  .chat-input {
    flex: 1;
    padding: 14px 20px;
    background: rgba(10, 18, 35, 0.5);
    border: 1px solid rgba(80, 130, 200, 0.1);
    border-radius: 16px;
    color: #e2e8f0;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .chat-input::placeholder {
    color: rgba(120, 145, 180, 0.3);
    font-weight: 300;
  }

  .chat-input:focus {
    border-color: rgba(100, 160, 255, 0.25);
    box-shadow: 0 0 24px rgba(80, 140, 240, 0.06);
    background: rgba(10, 18, 35, 0.75);
  }

  .mic-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(80, 130, 200, 0.12);
    background: rgba(10, 18, 35, 0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: rgba(140, 175, 220, 0.5);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .mic-btn:hover {
    border-color: rgba(100, 160, 255, 0.25);
    color: rgba(170, 205, 255, 0.8);
    box-shadow: 0 0 20px rgba(80, 140, 240, 0.08);
  }

  .mic-btn.active {
    border-color: rgba(120, 175, 255, 0.4);
    background: rgba(60, 120, 200, 0.12);
    color: rgba(180, 215, 255, 1);
    box-shadow: 0 0 30px rgba(80, 140, 240, 0.15);
    animation: micPulse 1.5s ease-in-out infinite;
  }

  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 25px rgba(80,140,240,0.15); }
    50% { box-shadow: 0 0 45px rgba(80,140,240,0.25); }
  }

  .mic-icon { width: 20px; height: 20px; }

  /* ---- Response bubble ---- */
  .response {
    position: absolute;
    bottom: 80px;
    left: 50%; transform: translateX(-50%);
    max-width: min(500px, 85vw);
    padding: 14px 22px;
    background: rgba(10, 18, 35, 0.6);
    border: 1px solid rgba(80, 130, 200, 0.08);
    border-radius: 16px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    font-size: 14px;
    font-weight: 300;
    line-height: 1.65;
    color: rgba(190, 210, 240, 0.8);
    z-index: 10;
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
    text-align: center;
  }

  .response.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* ---- GitHub link ---- */
  .github-link {
    position: fixed;
    top: 24px; right: 28px;
    z-index: 20;
    color: rgba(120, 145, 180, 0.3);
    transition: color 0.3s;
    text-decoration: none;
  }
  .github-link:hover { color: rgba(170, 200, 255, 0.65); }
  .github-link svg { width: 24px; height: 24px; }

  /* ---- Status ---- */
  .status {
    position: fixed;
    bottom: 20px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(100, 130, 170, 0.2);
    z-index: 2;
  }

  /* ---- Responsive ---- */
  @media (max-height: 700px) {
    .sphere-wrap { width: 220px; height: 220px; margin-bottom: 24px; }
    .shader-sphere { width: 200px; height: 200px; }
    .brand { font-size: 34px; letter-spacing: 12px; }
    .tagline { margin-bottom: 36px; }
  }

  @media (max-height: 580px) {
    .sphere-wrap { width: 160px; height: 160px; margin-bottom: 16px; }
    .shader-sphere { width: 150px; height: 150px; }
    .brand { font-size: 28px; letter-spacing: 10px; margin-bottom: 4px; }
    .tagline { margin-bottom: 24px; font-size: 11px; }
  }
</style>
</head>
<body>

<canvas class="stars-canvas" id="starfield"></canvas>
<div class="ambient"></div>

<a href="https://github.com/ansschh/cortex" target="_blank" rel="noopener" class="github-link" title="View on GitHub">
  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
</a>

<div class="sphere-wrap" id="sphere" title="Click to speak">
  <div class="shader-sphere" id="shaderSphere"></div>
  <div class="sphere-fade"></div>
  <div class="sphere-highlight"></div>
</div>

<div class="brand">Aeon</div>
<div class="tagline">the room that thinks</div>

<div class="chat-container">
  <input type="text" class="chat-input" id="chatInput" placeholder="Talk to Aeon..." autocomplete="off" spellcheck="false">
  <button class="mic-btn" id="micBtn" title="Hold to speak">
    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="1" width="6" height="13" rx="3"/>
      <path d="M19 10v1a7 7 0 01-14 0v-1"/>
      <line x1="12" y1="18" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
</div>

<div class="response" id="response"></div>
<div class="status" id="status"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/89/three.min.js"></script>
<script>
// ============================================================
// Shader sphere — aurora lines inside a sphere
// ============================================================
(function initShaderSphere() {
  const container = document.getElementById('shaderSphere');
  if (!window.THREE) return;

  const THREE = window.THREE;
  const camera = new THREE.Camera();
  camera.position.z = 1;

  const scene = new THREE.Scene();
  const geometry = new THREE.PlaneBufferGeometry(2, 2);

  const uniforms = {
    time: { type: 'f', value: 1.0 },
    resolution: { type: 'v2', value: new THREE.Vector2() },
    intensity: { type: 'f', value: 1.0 },
  };

  const vertexShader = `void main() { gl_Position = vec4(position, 1.0); }`;

  // Custom aurora shader — light blue/white lines on dark, shaped into sphere
  const fragmentShader = `
    precision highp float;
    uniform vec2 resolution;
    uniform float time;
    uniform float intensity;

    float random(in float x) {
      return fract(sin(x) * 1e4);
    }

    void main(void) {
      vec2 uv = (gl_FragCoord.xy * 2.0 - resolution.xy) / min(resolution.x, resolution.y);

      // Circular mask — sphere shape
      float dist = length(uv);
      float sphere = smoothstep(1.0, 0.6, dist);
      if (sphere < 0.001) { gl_FragColor = vec4(0.012, 0.027, 0.07, 1.0); return; }

      // Mosaic / pixelation for the line effect
      vec2 screenSize = vec2(256.0, 256.0);
      vec2 mosaicScale = vec2(4.0, 2.0);
      vec2 uvQ = uv;
      uvQ.x = floor(uvQ.x * screenSize.x / mosaicScale.x) / (screenSize.x / mosaicScale.x);
      uvQ.y = floor(uvQ.y * screenSize.y / mosaicScale.y) / (screenSize.y / mosaicScale.y);

      float t = time * 0.04 + random(uvQ.x) * 0.4;
      float lineWidth = 0.0006 * intensity;

      // Accumulate glow lines
      vec3 color = vec3(0.0);
      for (int j = 0; j < 3; j++) {
        for (int i = 0; i < 5; i++) {
          float fi = float(i);
          float fj = float(j);
          float val = lineWidth * fi * fi / abs(fract(t - 0.012 * fj + fi * 0.01) * 1.0 - length(uv));
          color[j] += val;
        }
      }

      // Remap: original is BGR-ish. Shift to light blue / white / cyan palette.
      // color[0] = reddish band, color[1] = mid, color[2] = blue band
      vec3 aurora;
      aurora.r = color[1] * 0.5 + color[2] * 0.25;  // muted blue-white
      aurora.g = color[1] * 0.65 + color[2] * 0.5;   // slightly more green-blue
      aurora.b = color[2] * 1.0 + color[1] * 0.4;    // strongest blue

      // Add a subtle white core glow
      float coreGlow = exp(-dist * 3.0) * 0.12 * intensity;
      aurora += vec3(coreGlow * 0.8, coreGlow * 0.9, coreGlow);

      // Darken toward edges for 3D depth
      aurora *= sphere;

      // Very dark navy base (matches background)
      vec3 bg = vec3(0.012, 0.027, 0.07);
      vec3 final_color = bg + aurora;

      gl_FragColor = vec4(final_color, 1.0);
    }
  `;

  const material = new THREE.ShaderMaterial({
    uniforms: uniforms,
    vertexShader: vertexShader,
    fragmentShader: fragmentShader,
  });

  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  function resize() {
    const rect = container.getBoundingClientRect();
    renderer.setSize(rect.width, rect.height);
    uniforms.resolution.value.x = renderer.domElement.width;
    uniforms.resolution.value.y = renderer.domElement.height;
  }
  resize();
  window.addEventListener('resize', resize);

  // Expose intensity control for listening/thinking states
  window._shaderUniforms = uniforms;

  function animate() {
    requestAnimationFrame(animate);
    uniforms.time.value += 0.05;
    renderer.render(scene, camera);
  }
  animate();
})();

// ============================================================
// Starfield canvas
// ============================================================
(function initStarfield() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  const COUNT = 100;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for (let i = 0; i < COUNT; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.1 + 0.2,
        a: Math.random() * 0.2 + 0.04,
        speed: Math.random() * 0.0006 + 0.0002,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      const flicker = Math.sin(t * s.speed * 1000 + s.phase) * 0.15 + 0.85;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(160,185,220,${s.a * flicker})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();

// ============================================================
// Chat + Voice
// ============================================================
const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? `http://${window.location.hostname}:8000` : '';

const chatInput = document.getElementById('chatInput');
const micBtn = document.getElementById('micBtn');
const responseEl = document.getElementById('response');
const statusEl = document.getElementById('status');
const sphere = document.getElementById('sphere');

let isProcessing = false;

function showResponse(text) {
  responseEl.textContent = text;
  responseEl.classList.add('visible');
  clearTimeout(responseEl._timer);
  responseEl._timer = setTimeout(() => responseEl.classList.remove('visible'), 8000);
}

function setStatus(text) {
  statusEl.textContent = text;
  setTimeout(() => { if (statusEl.textContent === text) statusEl.textContent = ''; }, 4000);
}

function setSphereState(state) {
  sphere.classList.remove('listening', 'thinking');
  if (state) sphere.classList.add(state);

  // Drive shader intensity
  if (window._shaderUniforms) {
    if (state === 'listening') window._shaderUniforms.intensity.value = 1.8;
    else if (state === 'thinking') window._shaderUniforms.intensity.value = 1.4;
    else window._shaderUniforms.intensity.value = 1.0;
  }
}

async function sendMessage(text) {
  if (!text.trim() || isProcessing) return;
  isProcessing = true;
  setSphereState('thinking');
  setStatus('thinking');

  try {
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text.trim() }),
    });
    if (!res.ok) throw new Error(`${res.status}`);
    const data = await res.json();
    showResponse(data.assistant || 'No response.');
  } catch (e) {
    if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
      showResponse('Aeon is offline. Start the server: python run_server.py');
    } else {
      showResponse('Something went wrong. Is the server running?');
    }
  } finally {
    isProcessing = false;
    setSphereState(null);
    setStatus('');
  }
}

chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = chatInput.value;
    chatInput.value = '';
    sendMessage(text);
  }
});

// ---- Microphone (Web Speech API) ----
let recognition = null;
let isListening = false;

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add('active');
    setSphereState('listening');
    setStatus('listening');
    chatInput.placeholder = 'Listening...';
  };

  recognition.onresult = (event) => {
    let transcript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    chatInput.value = transcript;
    if (event.results[event.results.length - 1].isFinal) {
      stopListening();
      chatInput.value = '';
      sendMessage(transcript);
    }
  };

  recognition.onerror = (e) => {
    stopListening();
    if (e.error !== 'aborted' && e.error !== 'no-speech') {
      setStatus(e.error === 'not-allowed' ? 'microphone blocked' : '');
    }
  };

  recognition.onend = () => stopListening();
}

function startListening() {
  if (!recognition || isListening) return;
  try { recognition.start(); } catch(e) {}
}

function stopListening() {
  isListening = false;
  micBtn.classList.remove('active');
  setSphereState(null);
  chatInput.placeholder = 'Talk to Aeon...';
  try { recognition?.stop(); } catch(e) {}
}

micBtn.addEventListener('click', () => {
  if (!recognition) { setStatus('speech not supported'); return; }
  isListening ? stopListening() : startListening();
});

sphere.addEventListener('click', () => {
  if (!recognition) { chatInput.focus(); return; }
  isListening ? stopListening() : startListening();
});

// Space to toggle mic when chat not focused
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && document.activeElement !== chatInput) {
    e.preventDefault();
    if (!recognition) return;
    isListening ? stopListening() : startListening();
  }
});
</script>
</body>
</html>
